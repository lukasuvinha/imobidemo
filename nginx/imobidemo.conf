# ============================================================
# /etc/nginx/sites-available/imobidemo
# ============================================================
# Copie para: /etc/nginx/sites-available/imobidemo
# Ative com:  sudo ln -s /etc/nginx/sites-available/imobidemo /etc/nginx/sites-enabled/
# Teste:      sudo nginx -t
# Reload:     sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name imobidemo.duckdns.org;

    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name imobidemo.duckdns.org;

    # ---- SSL (Certbot vai preencher automaticamente) ----
    ssl_certificate     /etc/letsencrypt/live/imobidemo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imobidemo.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Root ----
    root  /var/www/html;
    index index.html index.php;
    charset utf-8;

    # ---- Security Headers ----
    add_header X-Frame-Options       "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection      "1; mode=block"         always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ---- Uploads: serve estático, sem PHP ----
    location /uploads/ {
        alias /var/www/html/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- Assets estáticos ----
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- API: .php direto ----
    location /api/ {
        try_files $uri $uri/ =404;
    }

    # ---- Corretor ----
    location /corretor/ {
        try_files $uri $uri/ /corretor/index.html;
    }

    # ---- PHP via PHP-FPM ----
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # ajuste versão se necessário
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Segurança: bloqueia uploads de PHP
        location ~ ^/uploads/.*\.php$ { deny all; }
    }

    # ---- Fallback SPA ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---- Bloqueia arquivos sensíveis ----
    location ~ /\. { deny all; }
    location ~ \.(sql|sh|env)$ { deny all; }

    # ---- Logs ----
    access_log /var/log/nginx/imobidemo_access.log;
    error_log  /var/log/nginx/imobidemo_error.log;

    # ---- Upload max size ----
    client_max_body_size 15M;
}
